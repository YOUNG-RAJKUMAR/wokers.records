<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConstructPro — Workforce Manager</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏗️</text></svg>">
</head>
<body>

<!-- ═══════════════════════════════════════
     AUTH SCREEN
════════════════════════════════════════ -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-icon">🏗️</div>
    <h1>ConstructPro</h1>
    <p class="auth-sub">Construction Workforce Management</p>
    <button id="btn-google-login" class="btn-google">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
      </svg>
      Continue with Google
    </button>
    <p class="auth-note">🔒 Your data is private and secured to your account only</p>
  </div>
</div>

<!-- ═══════════════════════════════════════
     MAIN APP
════════════════════════════════════════ -->
<div id="app" style="display:none">

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="brand">
      <span>🏗️</span>
      <span>ConstructPro</span>
    </div>
    <nav id="nav">
      <a class="nav-link active" data-page="dashboard">
        <span class="nav-icon">📊</span> Dashboard
      </a>
      <a class="nav-link" data-page="workers">
        <span class="nav-icon">👷</span> Workers
      </a>
      <a class="nav-link" data-page="attendance">
        <span class="nav-icon">📋</span> Attendance
      </a>
      <a class="nav-link" data-page="reports">
        <span class="nav-icon">📈</span> Reports
      </a>
    </nav>
    <div class="sidebar-footer">
      <img id="user-photo" src="" alt="U" class="user-photo">
      <div class="user-details">
        <span id="user-name" class="user-name"></span>
        <button id="btn-logout" class="btn-logout">Sign Out</button>
      </div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main id="main">
    <!-- TOPBAR -->
    <div id="topbar">
      <button id="btn-menu" class="btn-icon">☰</button>
      <div id="page-title">Dashboard</div>
      <div id="topbar-right"></div>
    </div>

    <!-- PAGE CONTENT -->
    <div id="content">
      <div id="page-dashboard"     class="page"></div>
      <div id="page-workers"       class="page" style="display:none"></div>
      <div id="page-worker-detail" class="page" style="display:none"></div>
      <div id="page-attendance"    class="page" style="display:none"></div>
      <div id="page-reports"       class="page" style="display:none"></div>
    </div>
  </main>
</div>

<!-- ═══════════════════════════════════════
     MODAL
════════════════════════════════════════ -->
<div id="modal-overlay" style="display:none">
  <div id="modal">
    <div id="modal-header">
      <h3 id="modal-title">Modal</h3>
      <button id="modal-close" class="modal-close-btn">✕</button>
    </div>
    <div id="modal-body"></div>
    <div id="modal-footer">
      <button id="modal-cancel"  class="btn btn-secondary">Cancel</button>
      <button id="modal-submit"  class="btn btn-primary">Save</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════
     CONFIRM DIALOG
════════════════════════════════════════ -->
<div id="confirm-overlay" style="display:none">
  <div id="confirm-box">
    <p id="confirm-msg"></p>
    <div id="confirm-footer">
      <button id="confirm-no"  class="btn btn-secondary">Cancel</button>
      <button id="confirm-yes" class="btn btn-danger">Delete</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast-container"></div>

<!-- ═══════════════════════════════════════
     FIREBASE (compat SDK — no build step)
════════════════════════════════════════ -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/nepali-date-converter@3.3.2/dist/nepali-date-converter.min.js"></script>
<script src="https://unpkg.com/nepali-date-converter@3.3.2/dist/nepali-date-converter.min.js"></script>
<script src="app.js"></script>
</body>
</html>
